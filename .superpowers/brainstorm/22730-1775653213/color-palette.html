<h2>カラーパレット</h2>
<p class="subtitle">「神話的・壮大」な世界観に合う配色はどれですか？</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="height:180px;background:linear-gradient(135deg, #0a0014 0%, #1a0530 50%, #0d0020 100%);display:flex;align-items:center;justify-content:center;gap:12px;padding:20px;">
      <div style="width:48px;height:48px;border-radius:8px;background:#0a0014;border:1px solid #1a1025;"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#7c3aed;"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#a855f7;box-shadow:0 0 12px rgba(168,85,247,0.4);"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#c084fc;"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#ede9fe;"></div>
    </div>
    <div class="card-body">
      <h3>A. ディープパープル</h3>
      <p>黒に近い深紫 → 鮮やかな紫のグラデーション。Mythosの神秘感にストレートに合う。紫一色でまとめる統一感。</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="height:180px;background:linear-gradient(135deg, #030712 0%, #0f172a 50%, #020617 100%);display:flex;align-items:center;justify-content:center;gap:12px;padding:20px;">
      <div style="width:48px;height:48px;border-radius:8px;background:#030712;border:1px solid #1e293b;"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#7c3aed;"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#06b6d4;box-shadow:0 0 12px rgba(6,182,212,0.4);"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#a855f7;"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#f0f9ff;"></div>
    </div>
    <div class="card-body">
      <h3>B. パープル × シアン</h3>
      <p>紫をメインに、シアン/ティールをアクセントで差し色。AIっぽさと宇宙感の両立。ベンチマークの強調にシアンを使える。</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image" style="height:180px;background:linear-gradient(135deg, #0a0014 0%, #1a0020 40%, #150005 100%);display:flex;align-items:center;justify-content:center;gap:12px;padding:20px;">
      <div style="width:48px;height:48px;border-radius:8px;background:#0a0014;border:1px solid #2a0020;"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#9333ea;"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#e11d48;box-shadow:0 0 12px rgba(225,29,72,0.4);"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#c084fc;"></div>
      <div style="width:48px;height:48px;border-radius:8px;background:#fce7f3;"></div>
    </div>
    <div class="card-body">
      <h3>C. パープル × クリムゾン</h3>
      <p>深紫に赤を差し色で混ぜる。「危険な力」「制御の難しさ」を暗示。安全性セクションで赤が効果的に使える。少しダークで不穏な雰囲気。</p>
    </div>
  </div>
</div>
