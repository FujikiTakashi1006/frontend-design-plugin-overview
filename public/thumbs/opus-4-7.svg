<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f5f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0066ff"/>
      <stop offset="1" stop-color="#5b9eff"/>
    </linearGradient>
    <linearGradient id="accent-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0066ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0066ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- ambient glow -->
  <circle cx="650" cy="140" r="220" fill="url(#accent-soft)"/>

  <!-- eyebrow -->
  <text x="56" y="90" font-family="-apple-system, 'SF Pro Display', 'Inter Tight', sans-serif" font-size="15" font-weight="600" fill="#0066ff">New · Model briefing</text>

  <!-- main title -->
  <g font-family="-apple-system, 'SF Pro Display', 'Inter Tight', sans-serif" fill="#0a0a0a" font-weight="700" letter-spacing="-5">
    <text x="56" y="185" font-size="78">Claude Opus 4.7.</text>
    <text x="56" y="268" font-size="78" font-weight="600" font-style="italic" fill="url(#accent)">Frontier work,</text>
    <text x="56" y="351" font-size="78">delegated.</text>
  </g>

  <!-- stat row -->
  <line x1="56" y1="395" x2="744" y2="395" stroke="#e5e5ea" stroke-width="1"/>
  <g font-family="-apple-system, 'SF Pro Display', 'Inter Tight', sans-serif" fill="#0a0a0a">
    <g>
      <text x="56" y="440" font-size="34" font-weight="700" letter-spacing="-1.5">+13<tspan font-size="22">%</tspan></text>
      <text x="56" y="462" font-size="12" fill="#6e6e73" font-weight="500">コーディング改善</text>
    </g>
    <line x1="240" y1="412" x2="240" y2="468" stroke="#e5e5ea"/>
    <g>
      <text x="260" y="440" font-size="34" font-weight="700" letter-spacing="-1.5">3.75<tspan font-size="22"> MP</tspan></text>
      <text x="260" y="462" font-size="12" fill="#6e6e73" font-weight="500">画像最大解像度</text>
    </g>
    <line x1="445" y1="412" x2="445" y2="468" stroke="#e5e5ea"/>
    <g>
      <text x="465" y="440" font-size="34" font-weight="700" letter-spacing="-1.5">+1</text>
      <text x="465" y="462" font-size="12" fill="#6e6e73" font-weight="500">エフォート · xhigh</text>
    </g>
    <line x1="580" y1="412" x2="580" y2="468" stroke="#e5e5ea"/>
    <g>
      <text x="600" y="440" font-size="34" font-weight="700" letter-spacing="-1.5">$5 / $25</text>
      <text x="600" y="462" font-size="12" fill="#6e6e73" font-weight="500">per MTok</text>
    </g>
  </g>

  <!-- anthropic corner -->
  <text x="744" y="90" text-anchor="end" font-family="-apple-system, 'SF Pro Text', sans-serif" font-size="13" fill="#6e6e73">Anthropic · 2026</text>
</svg>
